<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TTR Europe"/>
<meta name="theme-color" content="#2c4a1e"/>
<title>Ticket to Ride: Europe</title>
<link rel="manifest" href="./manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#3a2a10;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{display:flex;flex-direction:column;height:100%;width:100%}
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#3a2a10;flex-shrink:0;flex-wrap:wrap}
#toolbar .title{font-size:13px;font-weight:600;color:#e8d5a0;letter-spacing:0.03em;white-space:nowrap}
#info{font-size:10px;color:rgba(232,213,160,0.65);flex:1;min-width:0}
#reset-btn{padding:5px 10px;font-size:11px;color:#e8d5a0;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.25);border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
#map-wrap{flex:1;overflow:auto;background:#e8d9b0;position:relative;-webkit-overflow-scrolling:touch}
#map-wrap svg{display:block;height:100%;min-width:994px;min-height:613px}
#stats{display:flex;gap:6px;padding:6px 10px;background:#3a2a10;flex-shrink:0;flex-wrap:wrap;align-items:center}
.stat-pill{background:rgba(255,255,255,0.1);border-radius:6px;padding:4px 10px;font-size:11px;border:0.5px solid rgba(255,255,255,0.15);color:rgba(232,213,160,0.7);display:flex;align-items:center;gap:5px}
.stat-pill strong{font-size:14px;font-weight:500;color:#e8d5a0}
#card-needs{display:flex;gap:5px;flex-wrap:wrap;padding:5px 10px 8px;background:#3a2a10;flex-shrink:0;align-items:center;min-height:30px}
.card-chip{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:100;white-space:nowrap}
#toast.show{opacity:1}
.route-hit{touch-action:none}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">🚂 TTR: Europe</span>
    <span id="info">Tap city = destination · Tap route to cycle: yours → opponent → clear</span>
    <button id="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div id="map-wrap">
    <svg id="map" viewBox="25 24 994 613" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="stats">
    <div class="stat-pill">Destinations <strong id="stat-dest">0</strong></div>
    <div class="stat-pill">Trains needed <strong id="stat-trains">—</strong></div>
    <div class="stat-pill">Segments <strong id="stat-segs">—</strong></div>
  </div>
  <div id="card-needs"><span style="font-size:10px;color:rgba(232,213,160,0.45)">Select 2+ destinations to see card needs</span></div>
</div>
<div id="toast"></div>

ROUTES.forEach((r,i)=>{if(!r.id)r.id=`r${i}`;});

const COLOR_STYLE={
  red:{fill:'#EE1111',text:'#fff'},blue:{fill:'#1166EE',text:'#fff'},
  green:{fill:'#22AA22',text:'#fff'},yellow:{fill:'#FFCC00',text:'#333'},
  orange:{fill:'#FF7700',text:'#fff'},pink:{fill:'#EE2288',text:'#fff'},
  black:{fill:'#111111',text:'#fff'},white:{fill:'#F0EDE0',text:'#333'},
  gray:{fill:'#888780',text:'#fff'},purple:{fill:'#8855EE',text:'#fff'},
  any:{fill:'#AAAAAA',text:'#fff'},
};

let state={destinations:new Set(),myRoutes:new Set(),oppRoutes:new Set()};
const svg=document.getElementById('map');
let lastTouch=0;

function perp(a,b,offset){
  const dx=CITIES[b][0]-CITIES[a][0],dy=CITIES[b][1]-CITIES[a][1];
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  return[-dy/len*offset,dx/len*offset];
}
function routeOffset(r,all){
  const same=all.filter(x=>(x.a===r.a&&x.b===r.b)||(x.a===r.b&&x.b===r.a));
  if(same.length<2)return 0;
  return same.indexOf(r)===0?-4:4;
}
function ns(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),1800);
}

function drawMap(){
  svg.innerHTML='';

  // ── SVG defs: filters & patterns ──────────────────────────────
  const defs=ns('defs');

  // Parchment noise filter for land
  const filt=ns('filter');
  filt.setAttribute('id','parchment');filt.setAttribute('x','0%');filt.setAttribute('y','0%');
  filt.setAttribute('width','100%');filt.setAttribute('height','100%');
  const feTurb=ns('feTurbulence');
  feTurb.setAttribute('type','fractalNoise');feTurb.setAttribute('baseFrequency','0.65');
  feTurb.setAttribute('numOctaves','3');feTurb.setAttribute('stitchTiles','stitch');
  const feColor=ns('feColorMatrix');
  feColor.setAttribute('type','saturate');feColor.setAttribute('values','0');
  const feBlend=ns('feBlend');feBlend.setAttribute('in','SourceGraphic');feBlend.setAttribute('mode','multiply');
  filt.appendChild(feTurb);filt.appendChild(feColor);filt.appendChild(feBlend);
  defs.appendChild(filt);

  // Label halo filter
  const halo=ns('filter');halo.setAttribute('id','halo');halo.setAttribute('x','-20%');halo.setAttribute('y','-20%');halo.setAttribute('width','140%');halo.setAttribute('height','140%');
  const feMorph=ns('feMorphology');feMorph.setAttribute('operator','dilate');feMorph.setAttribute('radius','1.5');feMorph.setAttribute('in','SourceAlpha');feMorph.setAttribute('result','expanded');
  const feFlood=ns('feFlood');feFlood.setAttribute('flood-color','#e8d5a0');feFlood.setAttribute('flood-opacity','0.85');feFlood.setAttribute('result','color');
  const feComp=ns('feComposite');feComp.setAttribute('in','color');feComp.setAttribute('in2','expanded');feComp.setAttribute('operator','in');feComp.setAttribute('result','haloOut');
  const feMerge=ns('feMerge');
  const fm1=ns('feMergeNode');fm1.setAttribute('in','haloOut');
  const fm2=ns('feMergeNode');fm2.setAttribute('in','SourceGraphic');
  feMerge.appendChild(fm1);feMerge.appendChild(fm2);
  halo.appendChild(feMorph);halo.appendChild(feFlood);halo.appendChild(feComp);halo.appendChild(feMerge);
  defs.appendChild(halo);
  svg.appendChild(defs);

  // ── Background ────────────────────────────────────────────────
  const bg=ns('rect');
  bg.setAttribute('width','979');bg.setAttribute('height','637');
  bg.setAttribute('fill','#e8d9b0');
  svg.appendChild(bg);

  // ── Shortest path highlight (drawn under routes) ──────────────
  const pathResult=state.destinations.size>=2?findAllPaths():null;
  const pathIds=pathResult?pathResult.routeIds:new Set();

  // ── All glows — drawn UNDER route cars ───────────────────────
  ROUTES.forEach(r=>{
    const isMine=state.myRoutes.has(r.id);
    const isOpp=state.oppRoutes.has(r.id);
    const isPath=pathIds.has(r.id)&&!isMine&&!isOpp;
    if(!isMine&&!isOpp&&!isPath)return;
    if(!CITIES[r.a]||!CITIES[r.b])return;
    const off=routeOffset(r,ROUTES);
    const [ox,oy]=perp(r.a,r.b,off);
    const ax=CITIES[r.a][0]+ox,ay=CITIES[r.a][1]+oy;
    const bx=CITIES[r.b][0]+ox,by=CITIES[r.b][1]+oy;
    const glow=ns('line');
    glow.setAttribute('x1',ax);glow.setAttribute('y1',ay);
    glow.setAttribute('x2',bx);glow.setAttribute('y2',by);
    glow.setAttribute('stroke',isMine?'#00cc44':isOpp?'#ff2200':'#FFD700');
    glow.setAttribute('stroke-width','18');
    glow.setAttribute('stroke-opacity','0.85');
    glow.setAttribute('stroke-linecap','round');
    glow.setAttribute('pointer-events','none');
    svg.appendChild(glow);
  });

  // ── Routes ────────────────────────────────────────────────────
  ROUTES.forEach(r=>{
    if(!CITIES[r.a]||!CITIES[r.b])return;
    const off=routeOffset(r,ROUTES);
    const [ox,oy]=perp(r.a,r.b,off);
    const ax=CITIES[r.a][0]+ox,ay=CITIES[r.a][1]+oy;
    const bx=CITIES[r.b][0]+ox,by=CITIES[r.b][1]+oy;
    const isMine=state.myRoutes.has(r.id);
    const isOpp=state.oppRoutes.has(r.id);
    const isPath=pathIds.has(r.id)&&!isMine&&!isOpp;
    const isSecond=off>0;
    const activeColor=(isSecond&&r.color2)?r.color2:r.color;
    const cs=COLOR_STYLE[activeColor]||COLOR_STYLE.any;
    const routeColor=isOpp?'#cc2200':isMine?'#116611':cs.fill;

    const totalLen=Math.sqrt((bx-ax)**2+(by-ay)**2);
    const segCount=r.len;
    const gap=3;
    const carLen=(totalLen-(gap*(segCount-1)))/segCount;
    const dx=(bx-ax)/totalLen,dy=(by-ay)/totalLen;
    const pw=4.5;

    // Path highlight drawn in a separate pass after all routes — see below

    // Draw each car as a rounded rectangle
    for(let i=0;i<segCount;i++){
      const t0=i*(carLen+gap)/totalLen;
      const t1=t0+carLen/totalLen;
      const x1=ax+dx*t0*totalLen, y1=ay+dy*t0*totalLen;
      const x2=ax+dx*t1*totalLen, y2=ay+dy*t1*totalLen;
      const mx=(x1+x2)/2,my=(y1+y2)/2;
      const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;

      const border=ns('rect');
      border.setAttribute('x',-(carLen/2)-1);border.setAttribute('y',-(pw+1));
      border.setAttribute('width',carLen+2);border.setAttribute('height',(pw+1)*2);
      border.setAttribute('rx','2');
      border.setAttribute('fill','#2a1a00');
      border.setAttribute('transform',`translate(${mx},${my}) rotate(${angle})`);
      border.setAttribute('pointer-events','none');
      svg.appendChild(border);

      const car=ns('rect');
      car.setAttribute('x',-carLen/2);car.setAttribute('y',-pw);
      car.setAttribute('width',carLen);car.setAttribute('height',pw*2);
      car.setAttribute('rx','2');
      car.setAttribute('fill',cs.fill);
      car.setAttribute('stroke','rgba(255,255,255,0.25)');
      car.setAttribute('stroke-width','0.5');
      car.setAttribute('fill-opacity','0.88');
      car.setAttribute('transform',`translate(${mx},${my}) rotate(${angle})`);
      car.setAttribute('pointer-events','none');
      svg.appendChild(car);

      const sheen=ns('rect');
      sheen.setAttribute('x',-carLen/2+1);sheen.setAttribute('y',-pw+0.5);
      sheen.setAttribute('width',carLen-2);sheen.setAttribute('height',pw*0.7);
      sheen.setAttribute('rx','1.5');
      sheen.setAttribute('fill','rgba(255,255,255,0.18)');
      sheen.setAttribute('transform',`translate(${mx},${my}) rotate(${angle})`);
      sheen.setAttribute('pointer-events','none');
      svg.appendChild(sheen);

      if(r.ferry){
        const fw=ns('line');
        fw.setAttribute('x1',-carLen/2+2);fw.setAttribute('y1','0');
        fw.setAttribute('x2',carLen/2-2);fw.setAttribute('y2','0');
        fw.setAttribute('stroke','rgba(180,220,255,0.6)');fw.setAttribute('stroke-width','1.5');
        fw.setAttribute('stroke-dasharray','3 2');
        fw.setAttribute('transform',`translate(${mx},${my}) rotate(${angle})`);
        fw.setAttribute('pointer-events','none');
        svg.appendChild(fw);
      }
    }

    // Tunnel: dashed outline on top of cars
    if(r.tunnel&&!isMine&&!isOpp){
      const outline=ns('line');
      outline.setAttribute('x1',ax);outline.setAttribute('y1',ay);
      outline.setAttribute('x2',bx);outline.setAttribute('y2',by);
      outline.setAttribute('stroke','#1a0e00');
      outline.setAttribute('stroke-width','11');
      outline.setAttribute('stroke-linecap','butt');
      outline.setAttribute('stroke-dasharray','4 8');
      outline.setAttribute('stroke-opacity','0.55');
      outline.setAttribute('pointer-events','none');
      svg.appendChild(outline);
    }

    // invisible wide hit area
    const hit=ns('line');
    hit.setAttribute('x1',ax);hit.setAttribute('y1',ay);
    hit.setAttribute('x2',bx);hit.setAttribute('y2',by);
    hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width','18');
    hit.setAttribute('cursor','pointer');
    hit.classList.add('route-hit');

    hit.addEventListener('touchend',e=>{
      e.preventDefault();
      lastTouch=Date.now();
      cycleRoute(r.id);
    });
    hit.addEventListener('click',e=>{
      e.preventDefault();e.stopPropagation();
      if(Date.now()-lastTouch<500)return;
      cycleRoute(r.id);
    });
    hit.addEventListener('contextmenu',e=>{e.preventDefault();});
    svg.appendChild(hit);
  });

  // ── Cities ────────────────────────────────────────────────────
  Object.entries(CITIES).forEach(([name,[x,y]])=>{
    const isDest=state.destinations.has(name);
    const g=ns('g');
    g.setAttribute('cursor','pointer');
    g.addEventListener('click',e=>{e.stopPropagation();toggleDest(name);});

    const shadow=ns('circle');
    shadow.setAttribute('cx',x+1.5);shadow.setAttribute('cy',y+1.5);
    shadow.setAttribute('r',isDest?9:7);
    shadow.setAttribute('fill','rgba(0,0,0,0.35)');
    g.appendChild(shadow);

    const ring=ns('circle');
    ring.setAttribute('cx',x);ring.setAttribute('cy',y);
    ring.setAttribute('r',isDest?9:7);
    ring.setAttribute('fill',isDest?'#e8a000':'#c87820');
    ring.setAttribute('stroke',isDest?'#fff5cc':'#8a5010');
    ring.setAttribute('stroke-width',isDest?'2':'1.5');
    g.appendChild(ring);

    const inner=ns('circle');
    inner.setAttribute('cx',x);inner.setAttribute('cy',y);
    inner.setAttribute('r',isDest?5:4);
    inner.setAttribute('fill',isDest?'#fff5cc':'#e8c878');
    g.appendChild(inner);

    const label=ns('text');
    label.setAttribute('x',x+10);label.setAttribute('y',y+4);
    label.setAttribute('font-size','8.5');
    label.setAttribute('font-weight','600');
    label.setAttribute('fill','#1a0e00');
    label.setAttribute('font-family','Georgia,serif');
    label.setAttribute('pointer-events','none');
    label.setAttribute('filter','url(#halo)');
    label.textContent=name;
    g.appendChild(label);
    svg.appendChild(g);
  });

  updateStats();
}

function dijkstra(src,tgt){
  const dist={},prev={},prevRoute={};
  Object.keys(CITIES).forEach(c=>dist[c]=Infinity);
  dist[src]=0;
  const queue=new Set(Object.keys(CITIES));
  while(queue.size){
    let u=null;
    for(const c of queue)if(u===null||dist[c]<dist[u])u=c;
    queue.delete(u);
    if(u===tgt)break;
    if(dist[u]===Infinity)break;
    ROUTES.forEach(r=>{
      if(state.oppRoutes.has(r.id))return;
      let nb=null;
      if(r.a===u)nb=r.b;else if(r.b===u)nb=r.a;
      if(!nb||!queue.has(nb))return;
      const cost=state.myRoutes.has(r.id)?0:r.len;
      const nd=dist[u]+cost;
      if(nd<dist[nb]){dist[nb]=nd;prev[nb]=u;prevRoute[nb]=r.id;}
    });
  }
  if(dist[tgt]===Infinity)return null;
  const routeIds=[];let cur=tgt;
  while(prev[cur]){routeIds.unshift(prevRoute[cur]);cur=prev[cur];}
  return{routeIds,cost:dist[tgt]};
}

function findAllPaths(){
  const dests=[...state.destinations];
  if(dests.length<2)return null;
  const visited=new Set([dests[0]]);
  const unvisited=new Set(dests.slice(1));
  const allIds=new Set();let totalCost=0;
  while(unvisited.size){
    let best=null;
    for(const v of visited)for(const u of unvisited){
      const r=dijkstra(v,u);
      if(r&&(!best||r.cost<best.result.cost))best={from:v,to:u,result:r};
    }
    if(!best)break;
    visited.add(best.to);unvisited.delete(best.to);
    best.result.routeIds.forEach(id=>allIds.add(id));
    totalCost+=best.result.cost;
  }
  return{routeIds:allIds,cost:totalCost};
}

function updateStats(){
  document.getElementById('stat-dest').textContent=state.destinations.size;
  const result=findAllPaths();
  if(!result){
    document.getElementById('stat-trains').textContent='—';
    document.getElementById('stat-segs').textContent='—';
    document.getElementById('card-needs').innerHTML='<span style="font-size:10px;color:rgba(232,213,160,0.45)">Select 2+ destinations to see card needs</span>';
    return;
  }
  let trains=0,segs=0;const cardCount={};
  result.routeIds.forEach(id=>{
    if(state.myRoutes.has(id))return;
    const r=ROUTES.find(x=>x.id===id);if(!r)return;
    trains+=r.len;segs++;
    const c=r.color==='any'?'any':r.color;
    cardCount[c]=(cardCount[c]||0)+r.len;
  });
  document.getElementById('stat-trains').textContent=trains;
  document.getElementById('stat-segs').textContent=segs;
  const needs=document.getElementById('card-needs');
  if(!Object.keys(cardCount).length){
    needs.innerHTML='<span style="font-size:10px;color:#44dd66">All routes already built!</span>';return;
  }
  needs.innerHTML='<span style="font-size:10px;color:rgba(232,213,160,0.6);margin-right:4px">Cards:</span>'+
    Object.entries(cardCount).map(([c,n])=>{
      const cs=COLOR_STYLE[c]||COLOR_STYLE.any;
      return`<span class="card-chip" style="background:${cs.fill};color:${cs.text}">${n}× ${c}</span>`;
    }).join('');
}

function cycleRoute(id){
  if(state.myRoutes.has(id)){
    state.myRoutes.delete(id);
    state.oppRoutes.add(id);
    showToast('Opponent route');
  }else if(state.oppRoutes.has(id)){
    state.oppRoutes.delete(id);
    showToast('Route cleared');
  }else{
    state.myRoutes.add(id);
    showToast('Your route');
  }
  drawMap();
}

function toggleDest(name){
  if(state.destinations.has(name)){state.destinations.delete(name);showToast(`${name} removed`);}
  else{state.destinations.add(name);showToast(`${name} → destination`);}
  drawMap();
}

function resetAll(){state.destinations.clear();state.myRoutes.clear();state.oppRoutes.clear();drawMap();showToast('Board reset');}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

drawMap();
if(screen.orientation&&screen.orientation.unlock){
  screen.orientation.unlock();
}
